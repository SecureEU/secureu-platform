version: '3.9'

services:
  manager:
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
    container_name: seuxdr-manager
    platform: linux/amd64
    hostname: Mac.home
    privileged: true  # Required for systemd to work properly
    ports:
      - "8443:8443"
      - "8081:8081"
    stdin_open: true
    tty: true
    restart: unless-stopped
    volumes:
      - ./manager/certs:/seuxdr/manager/certs
      # Persist the SEUXDR Go-server state (SQLite DB, log queue) across
      # container recreates. Wazuh's own state (/var/ossec, /etc/wazuh-*,
      # /var/lib/wazuh-*) is intentionally NOT volumed: Wazuh's installer
      # treats any pre-existing /var/ossec as "already installed" and refuses
      # to set up the services. Persisting Wazuh state requires either a
      # pre-installed image OR an installer wrapper, both deferred to v1.0.5.
      - seuxdr-storage:/seuxdr/manager/storage
      - seuxdr-queue:/var/seuxdr/manager/queue

volumes:
  seuxdr-storage:
  seuxdr-queue:
