<ossec_config>
  <!-- OSSEC global settings -->
  <global>
    <log>local</log>
    <log_format>json</log_format>
  </global>

  <!-- OSSEC agent configuration -->
  <client>
    <server-ip>YOUR_SERVER_IP</server-ip>
  </client>

  <!-- Syscheck configuration -->
  <syscheck>
    <!-- Frequency of syscheck checks in seconds (default is every 2 hours) -->
    <frequency>3600</frequency>
    
    <!-- Directories to check -->
    <directories check_all="yes">/System</directories>
    <directories check_all="yes">/Library</directories>
    <directories check_all="yes">/Applications</directories>
    <directories check_all="yes">/usr/local</directories>
    
    <!-- Files/directories to ignore -->
    <ignore>/System/Library/Logs</ignore>
    <ignore>/private/var/log/asl</ignore>

    <!-- Files/directories to not compute diffs -->
    <nodiff>/etc/hosts</nodiff>
  </syscheck>

  <!-- Rootcheck configuration -->
  <rootcheck>
    <rootkit_files>/usr/local/ossec/etc/rootkit_files.txt</rootkit_files>
    <rootkit_trojans>/usr/local/ossec/etc/rootkit_trojans.txt</rootkit_trojans>
  </rootcheck>

  <!-- Localfile configuration for monitoring specific logs -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/system.log</location>
    <ignore>*.gz</ignore>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/kernel.log</location>
    <ignore>*.gz</ignore>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/install.log</location>
    <ignore>*.gz</ignore>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/appfirewall.log</location>
    <ignore>*.gz</ignore>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/authd.log</location>
    <ignore>*.gz</ignore>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/secure.log</location>
    <ignore>*.gz</ignore>
  </localfile>


  <localfile>
  <location>macos</location>
  <log_format>macos</log_format>
  <query type="log,trace,activity" level="info">logType="fault" OR logType="error"</query>
  <historical>24h</historical>
  </localfile>

  <!-- Define rules for monitoring -->
  <rules>
    <include>default_rules.xml</include>
  </rules>

  <!-- Active responses configuration -->
  <active-response>
    <disabled>no</disabled>
    <command>firewalld-drop</command>
    <timeout>3600</timeout>
  </active-response>
</ossec_config>
