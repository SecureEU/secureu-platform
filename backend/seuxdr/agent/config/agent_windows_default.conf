<ossec_config>
  <!-- OSSEC agent configuration -->

  <client>
    <server-ip>YOUR_SERVER_IP</server-ip>
  </client>

  <syscheck>
    <!-- Frequency that syscheck is executed (default every 2 hours) -->
    <frequency>7200</frequency>

    <!-- Directories to check  (perform all possible verifications) -->
    <directories check_all="yes">C:\WINDOWS\system32</directories>
    <directories check_all="yes">C:\WINDOWS</directories>
    <directories check_all="yes">C:\Program Files</directories>

    <!-- Files/directories to ignore -->
    <ignore>C:\WINDOWS\Temp</ignore>
    <ignore>C:\WINDOWS\Prefetch</ignore>

    <!-- Check the file, but never compute the diff -->
    <nodiff>C:\WINDOWS\system32\drivers\etc\hosts</nodiff>
  </syscheck>

  <rootcheck>
    <!-- Enable rootcheck on Windows -->
    <rootkit_files>/var/seuxdr/etc/shared/rootkit_files.txt</rootkit_files>
    <rootkit_trojans>/var/seuxdr/etc/shared/rootkit_trojans.txt</rootkit_trojans>
  </rootcheck>

  <localfile>
    <log_format>eventchannel</log_format>
    <location>Application</location>
  </localfile>

  <!-- Example with simple query
  <localfile>
    <log_format>eventchannel</log_format>
    <location>Application</location>
    <query>Event/System[EventID=7040]</query>
  </localfile>
  -->

  <localfile>
    <log_format>eventchannel</log_format>
    <location>Security</location>
  </localfile>

  <!-- Example With Query List
  <localfile>
    <location>System</location>
    <log_format>eventchannel</log_format>
    <query>
      <QueryList>
        <Query Id="0" Path="System">
          <Select Path="System">*[System[(Level&lt;=3)]]</Select>
        </Query>
      </QueryList>
    </query>
  </localfile>
  -->

  <localfile>
    <location>System</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <localfile>
    <log_format>eventlog</log_format>
    <location>Windows PowerShell</location>
  </localfile>

</ossec_config>
