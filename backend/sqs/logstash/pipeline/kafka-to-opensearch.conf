input {
  kafka {
    bootstrap_servers => "localhost:9092"
    topics => ["dtm-alert", "dtm-event"]
    group_id => "sqs-opensearch-consumer"
    codec => "json"
    auto_offset_reset => "latest"
  }
}

filter {
  # Route to the correct OpenSearch index based on Suricata event_type
  if [event_type] == "alert" {
    # Check if it's a DDoS-related alert (by signature keywords)
    if [alert][signature] =~ /(?i)(dos|ddos|flood|amplification|volumetric)/ {
      mutate { add_field => { "[@metadata][target_index]" => "mirai-ddos" } }
    } else {
      mutate { add_field => { "[@metadata][target_index]" => "mirai-alerts" } }
    }

    # Normalize alert fields to flat fields for mirai-alerts/mirai-ddos compatibility
    if [alert][severity] {
      mutate { copy => { "[alert][severity]" => "alert_severity" } }
    }
    if [alert][signature] {
      mutate { copy => { "[alert][signature]" => "alert_signature" } }
    }
    if [alert][category] {
      mutate { copy => { "[alert][category]" => "alert_category" } }
    }

    # DDoS-specific: map numeric severity to level string
    if [@metadata][target_index] == "mirai-ddos" {
      if [alert][severity] == 1 {
        mutate { add_field => { "severity_level" => "critical" } }
      } else if [alert][severity] == 2 {
        mutate { add_field => { "severity_level" => "high" } }
      } else {
        mutate { add_field => { "severity_level" => "medium" } }
      }
    }
  } else if [event_type] == "http" {
    mutate { add_field => { "[@metadata][target_index]" => "mirai-http" } }

    # Normalize HTTP fields from nested Suricata format to flat fields
    if [http][http_method] {
      mutate { copy => { "[http][http_method]" => "http_method" } }
    }
    if [http][hostname] {
      mutate { copy => { "[http][hostname]" => "http_hostname" } }
    }
    if [http][http_user_agent] {
      mutate { copy => { "[http][http_user_agent]" => "http_user_agent" } }
    }
    if [http][url] {
      mutate { copy => { "[http][url]" => "http_url" } }
    }
    if [http][status] {
      mutate { copy => { "[http][status]" => "http_status" } }
    }
  } else if [event_type] == "flow" or [event_type] == "dns" or [event_type] == "tls" {
    mutate { add_field => { "[@metadata][target_index]" => "suricata" } }
  } else if [event_type] == "stats" {
    drop {}
  } else {
    mutate { add_field => { "[@metadata][target_index]" => "suricata" } }
  }

  # Remove Kafka metadata fields
  mutate {
    remove_field => ["@version", "[kafka]"]
  }
}

output {
  # Primary index routing
  opensearch {
    hosts => ["http://localhost:9200"]
    index => "%{[@metadata][target_index]}-%{+YYYY.MM}"
    action => "index"
  }

  # Also send all alerts to suricata-* so ET alerts endpoint can query them
  if [event_type] == "alert" {
    opensearch {
      hosts => ["http://localhost:9200"]
      index => "suricata-%{+YYYY.MM}"
      action => "index"
    }
  }
}
