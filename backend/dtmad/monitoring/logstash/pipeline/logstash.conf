input {
    file {
        path => ["/var/log/suricata/eve.json"]
        sincedb_path => ["/usr/share/logstash/data/since.db"]
        codec => json
        type => "SuricataIDPS"
        start_position => "end"
    }
}

filter {
    # drop events that failed JSON parse (no event_type, would break Kafka consumer)
    if "_jsonparsefailure" in [tags] {
        drop {}
    }

    if [type] == "SuricataIDPS" {
        date {
            match => [ "timestamp", "ISO8601" ]
        }
        mutate {
            add_field => { "[sphinx][component]" => "dtm" }
            add_field => { "[sphinx][tool]" => "suricata" }
        }
    }

    if [event_type] == "alert" {
        mutate {
            add_field => { "event_kind" => "alert" }
        }
    } else if [event_type] == "stats" {
        mutate {
            add_field => { "event_kind" => "metric" }
        }
    } else {
        mutate {
            add_field => { "event_kind" => "event" }
        }
    }
}

output {
    kafka {
        codec => json
        client_id => "dtm-suricata"
        bootstrap_servers => "localhost:9092"
        topic_id => "dtm-%{[event_kind]}"
    }
}
